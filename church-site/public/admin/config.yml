# Decap CMS — GitHub backend (no Netlify required)
#
# SETUP (one-time, ~15 minutes):
# 1. Create a GitHub OAuth App:
#    → GitHub → Settings → Developer Settings → OAuth Apps → New OAuth App
#    Homepage URL:      https://church-site-27m.pages.dev
#    Authorization callback URL: https://decap-oauth.YOUR_SUBDOMAIN.workers.dev/callback
#
# 2. Deploy the oauth-worker (see /oauth-worker/worker.js in this repo)
#    via the Cloudflare Dashboard → Workers → Create Worker → paste the code
#    Then add two Environment Variables:
#      GITHUB_CLIENT_ID     = (from your OAuth App)
#      GITHUB_CLIENT_SECRET = (from your OAuth App — add as a Secret, not plaintext)
#      SITE_URL             = https://church-site-27m.pages.dev
#
# 3. Replace YOUR_SUBDOMAIN below with your actual Cloudflare Workers subdomain
#    (visible in the Cloudflare dashboard after creating the worker)

backend:
  name: github
  repo: David-Okello/church-site
  branch: main
  base_url: https://decap-oauth.okellodavid002.workers.dev
  auth_endpoint: /auth

site_url: https://church-site-27m.pages.dev/

media_folder: "church-site/public/uploads"
public_folder: "/uploads"

collections:
  - name: "sermons"
    label: "Sermons"
    folder: "church-site/content/sermons"
    create: true
    slug: "{{year}}-{{month}}-{{fields.title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Speaker", name: "speaker", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, picker_utc: true }
      - { label: "Scripture reference", name: "scripture", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Media URL (YouTube / audio link)", name: "mediaUrl", widget: "string", required: false }
      - label: "Key points"
        name: "keyPoints"
        widget: "list"
        required: false
        hint: "3–5 main points from the sermon"
        field: { label: "Point", name: "point", widget: "string" }
      - label: "Discussion questions"
        name: "discussionQuestions"
        widget: "list"
        required: false
        hint: "Questions for home groups or personal reflection"
        field: { label: "Question", name: "question", widget: "string" }
      - label: "Prayer points"
        name: "prayerPoints"
        widget: "list"
        required: false
        hint: "Specific prayers tied to this message"
        field: { label: "Prayer point", name: "prayerPoint", widget: "string" }

  - name: "events"
    label: "Events"
    folder: "church-site/content/events"
    create: true
    slug: "{{year}}-{{month}}-{{fields.title}}"
    fields:
      - { label: "Event title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, picker_utc: true }
      - { label: "Time", name: "time", widget: "string", hint: "e.g. 10:00 AM" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }

  - name: "announcements"
    label: "Announcements"
    folder: "church-site/content/announcements"
    create: true
    slug: "{{year}}-{{month}}-{{fields.title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, picker_utc: true }
      - { label: "Body", name: "body", widget: "text" }
      - { label: "Show on homepage", name: "active", widget: "boolean", default: true }

  - name: "settings"
    label: "Church Settings"
    files:
      - label: "Site settings"
        name: "settings"
        file: "church-site/content/settings.json"
        fields:
          - { label: "Church name", name: "churchName", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "WhatsApp", name: "whatsapp", widget: "string" }
          - { label: "Pastor name", name: "pastorName", widget: "string" }
          - { label: "Pastor quote", name: "pastorQuote", widget: "text" }
          - { label: "Mission statement", name: "missionStatement", widget: "text" }
          - { label: "Founded year", name: "foundedYear", widget: "string" }
          - { label: "Denomination", name: "denomination", widget: "string" }
          - { label: "Scripture verse text", name: "verseText", widget: "text" }
          - { label: "Scripture verse reference", name: "verseReference", widget: "string", hint: "e.g. Jeremiah 29:11" }
          - { label: "YouTube channel URL", name: "youtubeUrl", widget: "string", required: false }
          - { label: "Facebook page URL", name: "facebookUrl", widget: "string", required: false }
          - label: "Service times"
            name: "serviceTimes"
            widget: "list"
            fields:
              - { label: "Day", name: "day", widget: "string" }
              - { label: "Time", name: "time", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }

      - label: "Leadership team"
        name: "leadership"
        file: "church-site/content/leadership.json"
        fields:
          - label: "Leaders"
            name: "leaders"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Bio", name: "bio", widget: "text" }
              - { label: "Tag", name: "tag", widget: "string", required: false }
